<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kwa Hadija 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* MAIN CARD */
.container{
  background:white;
  width:95%;
  max-width:400px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  text-align:center;
}

h1{color:#ff4d6d;font-size:1.5rem;}

#question{
  margin:15px 0;
  font-size:1rem;
}

/* BUTTONS */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  font-size:0.9rem;
}

#yesBtn{background:#ff4d6d;color:white;}
#noBtn{
  background:#6a0dad;
  color:white;
  position:fixed;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  background:white;
  padding:6px;
  font-size:0.8rem;
  color:#ff4d6d;
}

/* EFFECTS */
.emoji{
  position:absolute;
  font-size:1.8rem;
  animation:float 2s linear forwards;
}

@keyframes float{
  from{opacity:1;transform:translateY(0);}
  to{opacity:0;transform:translateY(-120px);}
}

.note{
  position:absolute;
  background:#fffdd0;
  padding:5px 8px;
  border-radius:8px;
  font-size:0.8rem;
}

/* SIGNATURE */
canvas{
  width:100%;
  height:130px;
  border:1px solid black;
  border-radius:10px;
  margin-top:10px;
}

.signature-line{
  border-bottom:2px solid black;
  height:35px;
  position:relative;
}

.signature-input{
  position:absolute;
  width:100%;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:14px;
}

#saveBtn{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#28a745;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Habari Hadija 💖</h1>
  <div id="question">Je, unanipenda?</div>

  <button id="yesBtn">NDIO</button>
  <button id="noBtn">HAPANA</button>
</div>

<footer>© 2026 All copies reserved</footer>

<audio id="noSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>
<audio id="yesSound" src="https://www.soundjay.com/button/button-3.mp3"></audio>

<script>
const questions=[
"Je, unanipenda?","Je, utaendelea kuwa nami daima?","Je, unanikosa?",
"Je, ungependa kusafiri nami?","Je, utanishika mkono daima?",
"Je, unanikumbuka?","Je, unapenda tabasamu langu?",
"Je, tutacheka pamoja?","Je, ungependa maisha pamoja nami?",
"Je, utanisaidia?","Je, unafurahia kuwa nami?",
"Je, utakuwa furaha yangu?","Je, ungependa tuwe pamoja kila siku?",
"Je, utaniniamini?","Je, ungependa upendo wetu udumu?",
"Je, utashirikiana ndoto zako nami?","Je, unapenda muda wetu?",
"Je, utakuwa mwaminifu?","Je, ungependa tuwe pamoja milele?",
"Je, utakuwa mke wangu? 💍"
];

const noTexts=[
"Acha 😡","Jaribu tena 😢","Hapana haiwezekani!",
"Usikimbie!","Rudi hapa!","Lazima useme NDIO!"
];

let i=0;
const q=document.getElementById("question");
const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");

/* YES */
function yesFx(){
  ["💖","😍","🥰"].forEach(e=>{
    let el=document.createElement("div");
    el.className="emoji";
    el.innerText=e;
    el.style.left=Math.random()*100+"vw";
    el.style.top=Math.random()*100+"vh";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  });
}

yes.onclick=()=>{
  yesFx();
  document.getElementById("yesSound").play();
  i++;

  if(i<questions.length){
    q.innerText=questions[i];
  }else{
    document.body.innerHTML=`
    <div style="padding:15px;text-align:center;">
      <h2>💖 Asante Hadija 💖</h2>
      <p>Ninakubali kwa moyo wote 💕</p>

      <div class="signature-line">
        <input id="input" class="signature-input" placeholder="Andika herufi zako">
      </div>

      <canvas id="c"></canvas>
      <button id="saveBtn">💾 Hifadhi</button>
    </div>
    <footer>© 2026 All copies reserved</footer>
    `;

    const c=document.getElementById("c");
    const ctx=c.getContext("2d");
    c.width=c.offsetWidth;
    c.height=130;

    let d=false;

    c.onmousedown=e=>{
      d=true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX,e.offsetY);
    };

    c.onmousemove=e=>{
      if(d){
        ctx.lineTo(e.offsetX,e.offsetY);
        ctx.stroke();
      }
    };

    c.onmouseup=()=>d=false;

    // TOUCH
    c.addEventListener("touchstart",e=>{
      d=true;
      let t=e.touches[0];
      let r=c.getBoundingClientRect();
      ctx.beginPath();
      ctx.moveTo(t.clientX-r.left,t.clientY-r.top);
    });

    c.addEventListener("touchmove",e=>{
      if(d){
        let t=e.touches[0];
        let r=c.getBoundingClientRect();
        ctx.lineTo(t.clientX-r.left,t.clientY-r.top);
        ctx.stroke();
      }
    });

    c.addEventListener("touchend",()=>d=false);

    // TYPE
    document.getElementById("input").oninput=e=>{
      ctx.clearRect(0,0,c.width,c.height);
      ctx.font="25px Poppins";
      ctx.textAlign="center";
      ctx.fillText(e.target.value,c.width/2,c.height/2);
    };

    // SAVE
    document.getElementById("saveBtn").onclick=()=>{
      let a=document.createElement("a");
      a.href=c.toDataURL();
      a.download="sahihi.png";
      a.click();
    };
  }
};

/* NO */
let moving=false;

function moveNo(){
  let x=Math.random()*(window.innerWidth-80);
  let y=Math.random()*(window.innerHeight-80);
  no.style.left=x+"px";
  no.style.top=y+"px";
}

function chaos(){
  if(moving){
    moveNo();
    setTimeout(chaos,1800);
  }
}

no.onclick=()=>{
  moving=true;
  chaos();
  document.getElementById("noSound").play();

  let n=document.createElement("div");
  n.className="note";
  n.innerText=noTexts[Math.floor(Math.random()*noTexts.length)];
  n.style.left="50%";
  n.style.top="50%";
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),1500);

  let e=document.createElement("div");
  e.className="emoji";
  e.innerText="😡";
  e.style.left="50%";
  e.style.top="50%";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1500);
};
</script>

</body>
</html>
